{% extends "base.html" %}

{% block title %}Selecionar Especialidade{% endblock %}

{% block content %}
<div class="container" style="max-width: 680px; margin: 4rem auto;">
    <div class="card shadow-sm border-0">
        <div class="card-header text-white py-4" style="background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);">
            <h2 class="mb-1 text-center" style="font-size: 1.6rem; font-weight: 700;">
                <i class="fas fa-hospital-user me-2"></i>Sistema de Solicitação de Cirurgia
            </h2>
            <p class="mb-0 text-center" style="opacity: .85;">Selecione a especialidade para iniciar</p>
        </div>
        <div class="card-body p-4">
            <form method="POST" action="{{ url_for('main.select_specialty') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="row g-3 justify-content-center">
                    {% for sp in specialties %}
                    <div class="col-md-6">
                        <label class="d-block h-100" style="cursor: pointer;">
                            <input type="radio" name="specialty_slug" value="{{ sp.slug }}" class="d-none specialty-radio" id="sp_{{ sp.slug }}"
                                {% if loop.first %}checked{% endif %}>
                            <div class="specialty-card border rounded-3 p-4 text-center h-100 d-flex flex-column align-items-center justify-content-center"
                                 id="card_{{ sp.slug }}"
                                 style="transition: all .2s; {% if loop.first %}border-color: #3b82f6 !important; background:#eff6ff;{% endif %}">
                                {% if sp.slug == 'ortopedia' %}
                                <i class="fas fa-bone fa-3x mb-3" style="color: #3b82f6;"></i>
                                {% elif sp.slug == 'cirurgia_pediatrica' %}
                                <i class="fas fa-child fa-3x mb-3" style="color: #10b981;"></i>
                                {% else %}
                                <i class="fas fa-stethoscope fa-3x mb-3" style="color: #6366f1;"></i>
                                {% endif %}
                                <h5 class="mb-0 fw-semibold">{{ sp.name }}</h5>
                            </div>
                        </label>
                    </div>
                    {% endfor %}
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-arrow-right me-2"></i>Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
  .specialty-card:hover {
    border-color: #3b82f6 !important;
    background: #eff6ff;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
  }
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.specialty-radio').forEach(function(radio) {
        radio.addEventListener('change', function() {
            // Reset todos
            document.querySelectorAll('.specialty-card').forEach(function(c) {
                c.style.borderColor = '';
                c.style.background = '';
            });
            // Destacar selecionado
            const card = document.getElementById('card_' + this.value);
            if (card) {
                card.style.borderColor = '#3b82f6';
                card.style.background = '#eff6ff';
            }
        });
    });
});
</script>
{% endblock %}
